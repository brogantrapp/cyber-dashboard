<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cyber Dashboard</title>

<link rel="stylesheet" href="style.css">

<!-- MapLibre -->
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">

</head>


<body>


<!-- STARTUP -->

<div id="startup">

    <img id="idleGif" src="assets/idle.gif">

    <h2 id="startText">
        PRESS SPACE TO START
    </h2>

</div>





<!-- APPLICATION -->

<div id="app">


<aside id="sidebar">


<button id="menu">
☰
</button>


<nav>

<button>Dashboard</button>
<button>Map</button>
<button>IP Lookup</button>
<button>Coordinates</button>
<button>DNS</button>
<button>WHOIS</button>
<button>Tools</button>
<button>Settings</button>

</nav>


</aside>





<main>


<header>

<input placeholder="Search...">


<div id="status">
● ONLINE
</div>


</header>





<section id="workspace">


<div class="panel map">


<h3>MAP</h3>


<div id="map"></div>


<div id="coordinates">

LAT: --
<br>
LON: --

</div>


</div>





<div class="panel tools">


<h3>TOOLS</h3>


<div class="placeholder">

SELECT A TOOL

</div>


</div>


</section>





<footer>

SYSTEM READY

</footer>



</main>



</div>





<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

<script src="script.js"></script>


</body>

</html>
